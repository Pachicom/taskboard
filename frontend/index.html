<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>TaskBoard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>TaskBoard</h1>
  <button id="toggleTheme">🌙 Тёмная тема</button>
  <button id="toggleLang">🌐 Сменить язык</button>
  <div id="board">
    <div class="column" data-status="todo">
      <h2>To Do</h2>
      <div class="tasks"></div>
    </div>
    <div class="column" data-status="inprogress">
      <h2>In Progress</h2>
      <div class="tasks"></div>
    </div>
    <div class="column" data-status="done">
      <h2>Done</h2>
      <div class="tasks"></div>
    </div>
  </div>
  <input id="newTask" placeholder="Новая задача">
  <button onclick="addTask()">Добавить</button>
  <script src="script.js"></script>
</body>
</html>
